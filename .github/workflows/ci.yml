name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check
      - run: bun test
      - run: bun run build:linux-amd64
      - run: dist/kubi-agent-linux-amd64 version
